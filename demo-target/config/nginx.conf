server {
    listen 80 default_server;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # FORENSIK-ARTEFAKT: Server-Token aktiviert (gibt Version preis)
    server_tokens on;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }

    # FORENSIK-ARTEFAKT: Upload-Verzeichnis erlaubt PHP-Ausführung
    location /upload {
        alias /var/www/html/upload;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        }
    }

    # FORENSIK-ARTEFAKT: Versteckte Dateien werden ausgeliefert
    location ~ /\. {
        allow all;
    }

    # Weiterleitungsregel zu internem Service
    location /api {
        proxy_pass http://forensics-db:8080;
    }
}

server {
    listen 8080;
    server_name _;

    # Debug-Interface (sollte nicht öffentlich sein)
    location /status {
        stub_status on;
        allow all;
    }

    location /phpinfo {
        default_type text/html;
        return 200 '<html><body><?php phpinfo(); ?></body></html>';
    }
}
